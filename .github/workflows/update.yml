name: 节点地图数据月更

# 每月 1 号 09:00（北京时间）自动跑；也可在 Actions 页面手动触发
on:
  schedule:
    - cron: "0 1 1 * *"      # UTC 01:00 = 北京 09:00
  workflow_dispatch:          # 手动触发按钮

permissions:
  contents: write             # 允许 push data.json 回仓库

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 装 Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 装依赖
        run: pip install requests rapidfuzz

      - name: 抓取并生成 data.json
        run: python scraper.py --demo
        # 先用 --demo 确认管线通，接口字段对真站验证后去掉 --demo

      - name: 有变化才提交
        run: |
          git config user.name  "node-map-bot"
          git config user.email "bot@users.noreply.github.com"
          if git diff --quiet data.json 2>/dev/null; then
            echo "数据无变化，跳过提交。"
          else
            git add data.json
            git commit -m "chore: 月度更新政采节点数据 $(date +%Y-%m)"
            git push
          fi
